# Classical LM (TinyLlama LoRA) config for Wake quiz generation
base_model: "TinyLlama/TinyLlama-1.1B-intermediate-step-1431k-3T"
train_file: "data/processed/lm_qa_pairs.jsonl"
val_file: "data/processed/lm_qa_pairs_val.jsonl"

output_dir: "models/wake_quiz_lm"

# training
per_device_train_batch_size: 2
gradient_accumulation_steps: 8
learning_rate: 2e-4
num_train_epochs: 5
warmup_ratio: 0.1
weight_decay: 0.01
seq_len: 256
seed: 42

# LoRA
use_lora: true
lora_r: 8
lora_alpha: 16
lora_dropout: 0.05
target_modules:
  - "q_proj"
  - "v_proj"

# generation defaults
generation:
  temperature: 0.9
  top_p: 0.92
  top_k: 50
  repetition_penalty: 1.15
  max_new_tokens: 256
